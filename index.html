<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makisha's Forex Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; }
.dash { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.header p { font-size: 13px; color: #888; margin-top: 2px; }
.refresh-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 8px 16px; cursor: pointer; border-radius: 8px; background: #fff; border: 1px solid #ddd; color: #1a1a1a; font-weight: 500; }
.refresh-btn:hover { background: #f0f0f0; }
.alert-banner { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-radius: 10px; background: #eaf3de; border: 1.5px solid #3b6d11; margin-bottom: 1.25rem; }
.alert-banner-title { font-size: 14px; font-weight: 600; color: #27500a; }
.alert-banner-sub { font-size: 12px; color: #3b6d11; margin-top: 2px; }
.alert-banner-sent { font-size: 12px; font-weight: 600; color: #27500a; background: #c0dd97; padding: 4px 12px; border-radius: 8px; white-space: nowrap; }
.pairs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
.pair-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1.25rem; }
.pair-card.ready-long { border: 2px solid #1d9e75; background: #f4fcf8; }
.pair-card.ready-short { border: 2px solid #d85a30; background: #fdf4f0; }
.pair-card.forming { border: 2px solid #ef9f27; background: #fffbf2; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.pair-name { font-size: 16px; font-weight: 600; color: #1a1a1a; }
.pair-sub { font-size: 12px; color: #888; margin-top: 2px; }
.price-val { font-size: 22px; font-weight: 600; color: #1a1a1a; text-align: right; }
.dir-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 8px; margin-top: 5px; }
.badge-long { background: #e1f5ee; color: #085041; }
.badge-short { background: #faece7; color: #712b13; }
.badge-flat { background: #f0f0f0; color: #888; }
.status-strip { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 8px; margin-bottom: 1rem; font-size: 13px; font-weight: 600; }
.s-ready { background: #e1f5ee; color: #0f6e56; }
.s-forming { background: #faeeda; color: #854f0b; }
.s-watch { background: #f5f5f5; color: #888; }
.section-label { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
.ema-rows { margin-bottom: 1rem; }
.ema-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-radius: 8px; background: #f9f9f9; margin-bottom: 3px; }
.ema-left { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #666; }
.ema-dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-20 { background: #378add; }
.dot-50 { background: #d85a30; }
.ema-val { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.crossover-box { padding: 10px 12px; border-radius: 8px; border: 1px solid #e5e5e5; margin-bottom: 1rem; background: #fafafa; }
.crossover-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ema-pill { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.p20 { background: #e6f1fb; color: #185fa5; }
.p50 { background: #faece7; color: #993c1d; }
.cross-signal { font-size: 13px; font-weight: 600; margin-left: 4px; }
.bullish { color: #0f6e56; }
.bearish { color: #993c1d; }
.flat-sig { color: #888; }
.cross-desc { font-size: 12px; color: #888; margin-top: 6px; }
.sr-rows { margin-bottom: 1rem; }
.sr-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
.sr-row:last-child { border-bottom: none; }
.sr-left { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }
.sr-dot-sup { width: 7px; height: 7px; border-radius: 50%; background: #1d9e75; }
.sr-dot-res { width: 7px; height: 7px; border-radius: 50%; background: #d85a30; }
.sr-val { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.sr-dist { font-size: 11px; color: #aaa; margin-left: 5px; font-weight: 400; }
.card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid #f0f0f0; }
.score-dots { display: flex; gap: 4px; margin-top: 4px; }
.sdot { width: 10px; height: 10px; border-radius: 50%; background: #e0e0e0; }
.sdot.f3 { background: #ef9f27; }
.sdot.f4 { background: #1d9e75; }
.rr-block { text-align: right; }
.rr-label { font-size: 11px; color: #888; }
.rr-val { font-size: 15px; font-weight: 600; margin-top: 2px; }
.rr-good { color: #0f6e56; }
.rr-warn { color: #854f0b; }
.rr-bad { color: #993c1d; }
.footer-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 1.25rem; flex-wrap: wrap; gap: 8px; }
.last-upd { font-size: 12px; color: #aaa; }
.poll-status { font-size: 12px; color: #888; display: flex; align-items: center; gap: 5px; }
.poll-dot { width: 7px; height: 7px; border-radius: 50%; background: #1d9e75; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.loading-state { text-align: center; padding: 2.5rem; color: #888; font-size: 14px; }
@media (max-width: 600px) { .pairs-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="dash">
  <div class="header">
    <div>
      <h1>Makisha's Forex Dashboard</h1>
      <p>EMA crossover · S/R levels · Auto alerts · 1H candles</p>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">&#x21BB; Refresh</button>
  </div>
  <div id="alertBanner"></div>
  <div class="pairs-grid" id="pairsGrid">
    <div class="loading-state">Fetching live data...</div>
  </div>
  <div class="footer-bar">
    <div class="last-upd" id="lastUpd"></div>
    <div class="poll-status"><div class="poll-dot"></div> Auto-refreshing every 5 min</div>
  </div>
</div>
<script>
var WEBHOOK = 'https://script.google.com/macros/s/AKfycbwGScbfS1VY3koSVBaMugpWiiIAlY4aa_WRp9wYrsoQykd2yMZYF1UEs2z8q1YI5lU/exec';
var API_KEY = '6609b2a381b14d95b39955a7fbb439cf';
var PAIRS = [
  { symbol: 'GBP/JPY', name: 'GBPJPY', decimals: 3 },
  { symbol: 'XAU/USD', name: 'XAUUSD', decimals: 2 }
];
var sentCache = {};

function calcEMA(prices, period) {
  var k = 2 / (period + 1);
  var e = 0;
  for (var i = 0; i < period; i++) e += prices[i];
  e = e / period;
  for (var i = period; i < prices.length; i++) e = prices[i] * k + e * (1 - k);
  return e;
}

function autoSR(candles) {
  var sup = Infinity, res = -Infinity;
  for (var i = 0; i < candles.length; i++) {
    if (candles[i].low < sup) sup = candles[i].low;
    if (candles[i].high > res) res = candles[i].high;
  }
  return { sup: sup, res: res };
}

function getDir(ema20, ema50) {
  var diff = ((ema20 - ema50) / ema50) * 100;
  if (diff > 0.01) return 'LONG';
  if (diff < -0.01) return 'SHORT';
  return 'FLAT';
}

function getScore(price, ema20, ema50, sup, res, dir) {
  var s = 0;
  if (dir !== 'FLAT') s++;
  if (dir === 'LONG' && price > ema20) s++;
  if (dir === 'SHORT' && price < ema20) s++;
  var prox = (res - sup) * 0.015;
  if (s >= 2) {
    if (dir === 'LONG' && Math.abs(price - sup) < prox) s++;
    if (dir === 'SHORT' && Math.abs(price - res) < prox) s++;
  }
  return s;
}

function fetchCandles(symbol) {
  var url = 'https://api.twelvedata.com/time_series?symbol=' + encodeURIComponent(symbol) + '&interval=1h&outputsize=60&apikey=' + API_KEY;
  return fetch(url).then(function(r) { return r.json(); }).then(function(d) {
    if (!d.values) return null;
    return d.values.reverse().map(function(v) {
      return { high: parseFloat(v.high), low: parseFloat(v.low), close: parseFloat(v.close) };
    });
  }).catch(function() { return null; });
}

function fireWebhook(pair, signal) {
  var key = pair + '_' + signal.direction + '_' + signal.score;
  if (sentCache[key]) return Promise.resolve(false);
  sentCache[key] = true;
  setTimeout(function() { delete sentCache[key]; }, 4 * 60 * 60 * 1000);
  return fetch(WEBHOOK, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pair: pair, direction: signal.direction, price: signal.price, sl: signal.sl, tp: signal.tp, rr: signal.rr, score: signal.score })
  }).then(function() { return true; }).catch(function() { return false; });
}

function renderBanner(alerts) {
  var el = document.getElementById('alertBanner');
  if (!alerts.length) { el.innerHTML = ''; return; }
  var names = alerts.map(function(a) { return a.pair + ' ' + a.direction; }).join(' · ');
  el.innerHTML = '<div class="alert-banner"><div style="font-size:22px">&#x1F514;</div><div class="alert-banner-text"><div class="alert-banner-title">Trade setup detected &mdash; SMS &amp; email sent</div><div class="alert-banner-sub">' + names + '</div></div><span class="alert-banner-sent">&#x2713; Sent</span></div>';
}

function renderCard(pair, d) {
  var price = d.price, ema20 = d.ema20, ema50 = d.ema50, sup = d.sup, res = d.res, dir = d.dir, score = d.score, sl = d.sl, tp = d.tp, rr = d.rr;
  var dc = pair.decimals;
  var isReady = score >= 3 && rr >= 1.5;
  var isForming = score >= 2 && !isReady;
  var cardClass = isReady ? (dir === 'LONG' ? 'ready-long' : 'ready-short') : isForming ? 'forming' : '';
  var stripClass = isReady ? 's-ready' : isForming ? 's-forming' : 's-watch';
  var stripText = isReady ? (score === 4 ? '&#x2713; 4/4 &mdash; Strong signal &middot; Alert sent' : '&#x2713; 3/4 &mdash; Good setup &middot; Alert sent') : isForming ? '&#x26A0; ' + score + '/4 &mdash; Setup forming, keep watching' : '&#x25CF; ' + score + '/4 &mdash; Watching';
  var dirClass = dir === 'LONG' ? 'badge-long' : dir === 'SHORT' ? 'badge-short' : 'badge-flat';
  var crossClass = dir === 'LONG' ? 'bullish' : dir === 'SHORT' ? 'bearish' : 'flat-sig';
  var crossLabel = dir === 'LONG' ? '&#x2191; above' : dir === 'SHORT' ? '&#x2193; below' : '&mdash; flat';
  var crossDesc = dir === 'LONG' ? '20 EMA above 50 EMA &mdash; bullish momentum' : dir === 'SHORT' ? '20 EMA below 50 EMA &mdash; bearish momentum' : 'EMAs are flat &mdash; no directional bias';
  var rrClass = rr >= 1.5 ? 'rr-good' : rr >= 1.0 ? 'rr-warn' : 'rr-bad';
  var dots = '';
  for (var i = 1; i <= 4; i++) dots += '<div class="sdot ' + (score >= i ? (score === 4 ? 'f4' : 'f3') : '') + '"></div>';
  var distSup = (((price - sup) / price) * 100).toFixed(2);
  var distRes = (((res - price) / price) * 100).toFixed(2);
  var dirArrow = dir === 'LONG' ? '&#x2191;' : dir === 'SHORT' ? '&#x2193;' : '&mdash;';

  return '<div class="pair-card ' + cardClass + '">' +
    '<div class="card-top"><div><div class="pair-name">' + pair.symbol + '</div><div class="pair-sub">1H · Live</div></div>' +
    '<div><div class="price-val">' + price.toFixed(dc) + '</div><div><span class="dir-badge ' + dirClass + '">' + dirArrow + ' ' + dir + '</span></div></div></div>' +
    '<div class="status-strip ' + stripClass + '">' + stripText + '</div>' +
    '<div class="section-label">EMA levels</div>' +
    '<div class="ema-rows">' +
    '<div class="ema-row"><span class="ema-left"><span class="ema-dot dot-20"></span>20 EMA</span><span class="ema-val">' + ema20.toFixed(dc) + '</span></div>' +
    '<div class="ema-row"><span class="ema-left"><span class="ema-dot dot-50"></span>50 EMA</span><span class="ema-val">' + ema50.toFixed(dc) + '</span></div></div>' +
    '<div class="crossover-box"><div class="crossover-row"><span class="ema-pill p20">20 EMA</span><span style="color:#aaa;margin:0 4px">&rarr;</span><span class="ema-pill p50">50 EMA</span><span class="cross-signal ' + crossClass + '" style="margin-left:6px">' + crossLabel + '</span></div><div class="cross-desc">' + crossDesc + '</div></div>' +
    '<div class="section-label">Support &amp; resistance</div>' +
    '<div class="sr-rows">' +
    '<div class="sr-row"><span class="sr-left"><span class="sr-dot-sup"></span>Support</span><span class="sr-val">' + sup.toFixed(dc) + '<span class="sr-dist">' + distSup + '% away</span></span></div>' +
    '<div class="sr-row"><span class="sr-left"><span class="sr-dot-res"></span>Resistance</span><span class="sr-val">' + res.toFixed(dc) + '<span class="sr-dist">' + distRes + '% away</span></span></div>' +
    '<div class="sr-row"><span class="sr-left">&#x2193; Stop loss</span><span class="sr-val">' + sl.toFixed(dc) + '</span></div>' +
    '<div class="sr-row"><span class="sr-left">&#x2191; Take profit</span><span class="sr-val">' + tp.toFixed(dc) + '</span></div></div>' +
    '<div class="card-footer"><div><div class="section-label" style="margin:0">Confluence ' + score + '/4</div><div class="score-dots">' + dots + '</div></div>' +
    '<div class="rr-block"><div class="rr-label">R:R ratio</div><div class="rr-val ' + rrClass + '">' + rr.toFixed(2) + ' : 1</div></div></div></div>';
}

function loadData() {
  var btn = document.getElementById('refreshBtn');
  btn.textContent = 'Loading...';
  var promises = PAIRS.map(function(pair) {
    return fetchCandles(pair.symbol).then(function(candles) {
      if (!candles || candles.length < 60) return { pair: pair, error: true };
      var closes = candles.map(function(c) { return c.close; });
      var price = closes[closes.length - 1];
      var ema20 = calcEMA(closes, 20);
      var ema50 = calcEMA(closes, 50);
      var sr = autoSR(candles);
      var sup = sr.sup, res = sr.res;
      var dir = getDir(ema20, ema50);
      var score = getScore(price, ema20, ema50, sup, res, dir);
      var sl = dir === 'LONG' ? sup * 0.999 : res * 1.001;
      var tp = dir === 'LONG' ? res * 0.999 : sup * 1.001;
      var risk = Math.abs(price - sl);
      var reward = Math.abs(tp - price);
      var rr = risk > 0 ? reward / risk : 0;
      return { pair: pair, data: { price: price, ema20: ema20, ema50: ema50, sup: sup, res: res, dir: dir, score: score, sl: sl, tp: tp, rr: rr } };
    });
  });

  Promise.all(promises).then(function(results) {
    var alertPromises = results.map(function(r) {
      if (!r.error && r.data.score >= 3 && r.data.rr >= 1.5) {
        return fireWebhook(r.pair.name, { direction: r.data.dir, price: r.data.price, sl: r.data.sl, tp: r.data.tp, rr: r.data.rr, score: r.data.score }).then(function(sent) {
          return sent ? { pair: r.pair.symbol, direction: r.data.dir } : null;
        });
      }
      return Promise.resolve(null);
    });

    Promise.all(alertPromises).then(function(alertResults) {
      var alerts = alertResults.filter(function(a) { return a !== null; });
      renderBanner(alerts);
      var html = results.map(function(r) {
        return r.error ? '<div class="pair-card"><div class="loading-state">Could not load ' + r.pair.symbol + '</div></div>' : renderCard(r.pair, r.data);
      }).join('');
      document.getElementById('pairsGrid').innerHTML = html;
      document.getElementById('lastUpd').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
      btn.textContent = '\u21BB Refresh';
    });
  });
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
